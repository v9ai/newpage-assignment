server {
    listen 80;

    # Same-origin API: the SPA calls /api/*, nginx forwards to the api container.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # SSE streaming (chat) must not be buffered
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
